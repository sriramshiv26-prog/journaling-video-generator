name: Comprehensive Security Scan (Week 2)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday scan

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # Job 1: Skill Scanner (unified scanning)
  skill-scanner:
    runs-on: ubuntu-latest
    name: Unified Security Scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install skill-scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep trivy

      - name: Run skill-scanner
        run: |
          python3 skill-scanner/scanner.py . \
            --json skill-scan-report.json \
            --markdown skill-scan-report.md
        continue-on-error: true

      - name: Upload skill-scanner reports
        uses: actions/upload-artifact@v3
        with:
          name: skill-scan-reports
          path: |
            skill-scan-report.*
          retention-days: 30

      - name: Comment PR with results (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('skill-scan-report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 🔒 Security Scan Results\n\n' + report
              });
            } catch (e) {
              console.log('Could not read report:', e);
            }

  # Job 2: Snyk - Deep SCA (Software Composition Analysis)
  snyk:
    runs-on: ubuntu-latest
    name: Snyk - Dependency Vulnerabilities
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk scan
        uses: snyk/actions/python-3.11@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: |
            --severity-threshold=high
            --json-file-output=snyk-results.json
        continue-on-error: true

      - name: Upload Snyk results
        uses: actions/upload-artifact@v3
        with:
          name: snyk-report
          path: snyk-results.json
          retention-days: 30

      - name: Comment PR with Snyk results (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('snyk-results.json', 'utf8'));
              const vulnCount = results.vulnerabilities?.length || 0;
              const status = vulnCount === 0 ? '✅' : '⚠️';
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ${status} Snyk SCA Results\n\n**Vulnerabilities Found:** ${vulnCount}\n\n[View full report in artifacts]`
              });
            } catch (e) {
              console.log('Could not parse Snyk results:', e);
            }

  # Job 3: Socket.dev - Supply Chain Attack Detection
  socket:
    runs-on: ubuntu-latest
    name: Socket.dev - Supply Chain Security
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install socket-pypi
        run: |
          pip install socket-pypi requests

      - name: Scan Python dependencies with Socket
        run: |
          if [ -f requirements.txt ]; then
            echo "Scanning requirements.txt..."
            socket-pypi scan requirements.txt --format json > socket-results.json || true
          fi

          if [ -f requirements-*.txt ]; then
            for file in requirements-*.txt; do
              echo "Scanning $file..."
              socket-pypi scan "$file" --format json >> socket-results.json || true
            done
          fi

          if [ -f setup.py ] || [ -f pyproject.toml ]; then
            echo "Scanning setup.py/pyproject.toml dependencies..."
            pip freeze > temp-requirements.txt
            socket-pypi scan temp-requirements.txt --format json >> socket-results.json || true
            rm temp-requirements.txt
          fi
        continue-on-error: true

      - name: Upload Socket results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: socket-report
          path: socket-results.json
          retention-days: 30

      - name: Check Socket results
        run: |
          if [ -f socket-results.json ]; then
            echo "Socket.dev scan completed"
            cat socket-results.json | head -20
          else
            echo "No Socket results generated"
          fi
        continue-on-error: true

  # Job 4: Syft - SBOM Generation
  sbom:
    runs-on: ubuntu-latest
    name: Syft - SBOM Generation
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX format)
        run: |
          syft . -o spdx > sbom-spdx.json
          echo "SPDX SBOM generated"

      - name: Generate SBOM (CycloneDX format)
        run: |
          syft . -o cyclonedx > sbom-cyclonedx.json
          echo "CycloneDX SBOM generated"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: sbom-reports
          path: |
            sbom-*.json
          retention-days: 90  # Keep longer for audit trail

      - name: Comment PR with SBOM info (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📋 SBOM Generated\n\n**Formats:**\n- SPDX JSON (`sbom-spdx.json`)\n- CycloneDX JSON (`sbom-cyclonedx.json`)\n\n[Download from artifacts above]'
            });

  # Job 5: License Compliance (ScanCode)
  licenses:
    runs-on: ubuntu-latest
    name: License Compliance Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ScanCode
        run: |
          brew install libmagic || true
          pip install scancode-toolkit

      - name: Scan licenses
        run: |
          scancode . --json sbom-licenses.json --quiet || true

      - name: Check for problematic licenses
        run: |
          if [ -f sbom-licenses.json ]; then
            echo "Checking for GPL/AGPL/copyleft licenses..."
            if grep -q '"GPL\|LGPL\|AGPL\|SSPL' sbom-licenses.json; then
              echo "⚠️  WARNING: Copyleft license detected - manual review needed"
            else
              echo "✓ No problematic licenses detected"
            fi
          fi
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: sbom-licenses.json
          retention-days: 90

  # Job 6: Summary Report
  summary:
    runs-on: ubuntu-latest
    needs: [skill-scanner, snyk, socket, sbom, licenses]
    name: Security Summary
    if: always()
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: reports

      - name: Create summary comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let summary = '## 🛡️ Complete Security Summary\n\n';
            summary += '| Check | Status |\n';
            summary += '|-------|--------|\n';

            const checks = [
              { name: 'Unified Scan', status: '${{ needs.skill-scanner.result }}' },
              { name: 'Snyk SCA', status: '${{ needs.snyk.result }}' },
              { name: 'Socket Supply Chain', status: '${{ needs.socket.result }}' },
              { name: 'SBOM Generated', status: '${{ needs.sbom.result }}' },
              { name: 'License Compliance', status: '${{ needs.licenses.result }}' }
            ];

            checks.forEach(check => {
              const icon = check.status === 'success' ? '✅' : '⚠️';
              summary += `| ${check.name} | ${icon} ${check.status.toUpperCase()} |\n`;
            });

            summary += '\n**Artifacts:** Check the "Artifacts" tab above for detailed reports\n';
            summary += '- `skill-scan-reports/` - Unified security scan\n';
            summary += '- `snyk-report/` - Dependency vulnerabilities\n';
            summary += '- `socket-report/` - Supply chain risks\n';
            summary += '- `sbom-reports/` - Bill of materials (SPDX + CycloneDX)\n';
            summary += '- `license-report/` - License compliance\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

# Outputs: All reports saved as artifacts
# - skill-scan-report.json / .md
# - snyk-results.json
# - socket-results.json
# - sbom-spdx.json / sbom-cyclonedx.json
# - sbom-licenses.json
